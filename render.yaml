services:
  - type: web
    name: deeptrack-platform
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_UNPOOLED
        sync: false
      - key: AUTH0_SECRET
        sync: false
      - key: AUTH0_DOMAIN
        sync: false
      - key: AUTH0_CLIENT_ID
        sync: false
      - key: AUTH0_CLIENT_SECRET
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: SHUFTI_CLIENT_ID
        sync: false
      - key: SHUFTI_SECRET_KEY
        sync: false
      - key: UPLOADTHING_TOKEN
        sync: false
